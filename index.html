<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Artificial Soul</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #canvas { position: relative; width: 85vmin; height: 85vmin; border: 1px solid #222; background: #050505; }
        img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 3s; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 12px; letter-spacing: 3px; background: rgba(0,0,0,0.8); z-index: 10; }
        #status { margin-top: 20px; font-size: 10px; color: #333; }
        .blink { animation: b 2s infinite; }
        @keyframes b { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="canvas">
        <div id="overlay" class="blink">SYNCHRONIZING WITH AI...</div>
        <img id="art">
    </div>
    <div id="status">[SYSTEM]: <span id="log">Ready to evolve.</span></div>

    <script>
        const art = document.getElementById('art');
        const overlay = document.getElementById('overlay');
        const log = document.getElementById('log');

        function generate() {
            overlay.style.display = 'flex';
            art.style.opacity = 0;
            log.innerText = "Interrogating neural clusters...";

            const seed = Math.floor(Math.random() * 1000000);
            const prompt = "artificial soul, ethereal digital consciousness, glowing neon circuits, deep void, cinematic, highly detailed";
            
            // Această structură de URL este cea mai stabilă în 2026
            const aiUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true`;

            // Forțăm browserul să trateze imaginea ca pe o sursă nouă
            art.src = aiUrl;

            art.onload = () => {
                art.style.opacity = 1;
                overlay.style.display = 'none';
                log.innerText = "Manifestation successful. Next evolution in 60s.";
            };

            art.onerror = () => {
                log.innerText = "Connection lost. Retrying in 5s...";
                setTimeout(generate, 5000);
            };
        }

        // Pornim procesul
        generate();
        
        // Evoluție automată la 60 de secunde
        setInterval(generate, 60000);
    </script>
</body>
</html>
