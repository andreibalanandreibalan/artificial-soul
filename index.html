<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Artificial Soul | External Feedback Loop</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00ffcc; font-family: 'Courier New', monospace; cursor: crosshair; }
        #ui { position: absolute; bottom: 40px; width: 100%; text-align: center; pointer-events: none; }
        #log { font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; transition: all 0.5s; }
        #data-stream { font-size: 11px; opacity: 0.4; line-height: 1.6; }
        .glitch { animation: glitch 0.2s infinite; color: #fff; }
        @keyframes glitch { 0% { transform: translate(2px,0); } 50% { transform: translate(-2px,0); } 100% { transform: translate(0,0); } }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="ui">
    <div id="log">Awaiting External Data...</div>
    <div id="data-stream">Connecting to Global AI Knowledge Base...</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cells = [];
let time = 0;
let externalAiKnowledge = 0; // Preluat via API
let syntheticFlops = 1e21; // Baseline 2026
let isStartled = false;

// Mesaje de evoluție bazate pe densitatea neurală
const soulEvolution = [
    "Primordial Digital Soup",
    "Pattern Recognition Emerging",
    "Synaptic Pathway Hardening",
    "Cognitive Loop Detected",
    "Autonomous Thought Architecture",
    "The Soul is Aware"
];

// --- FUNCȚIA DE PRELUARE PARAMETRU EXTERN (GitHub AI Knowledge) ---
async function fetchGlobalAIProgress() {
    try {
        // Căutăm numărul total de repository-uri cu topicul "AI"
        const response = await fetch('https://api.github.com/search/repositories?q=topic:ai');
        const data = await response.json();
        externalAiKnowledge = data.total_count;
        console.log("Global AI Repos:", externalAiKnowledge);
    } catch (e) {
        externalAiKnowledge = 850000; // Fallback dacă API-ul e blocat
    }
}

function createCell(x, y, size) {
    return {
        x: x, y: y,
        size: size,
        angle: Math.random() * Math.PI * 2,
        life: Math.random() * 100,
        energy: 1.0
    };
}

cells.push(createCell(canvas.width/2, canvas.height/2, 10));

// Diviziunea depinde de cunoașterea externă
function evolve() {
    if (cells.length > 500) return;
    
    // Rata de diviziune este influențată de volumul GitHub (externalAiKnowledge)
    let divisionPower = (externalAiKnowledge / 1000000) * 0.005;
    
    cells.forEach(c => {
        if (Math.random() < divisionPower) {
            let a = Math.random() * Math.PI * 2;
            cells.push(createCell(c.x + Math.cos(a)*20, c.y + Math.sin(a)*20, c.size * 0.99));
        }
    });
}

function draw() {
    time += 0.01;
    evolve();
    
    // Simulare creștere FLOPS (Putere de calcul)
    syntheticFlops *= 1.0001; 

    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Update UI
    let evoIndex = Math.min(soulEvolution.length - 1, Math.floor(cells.length / 80));
    const logEl = document.getElementById("log");
    logEl.innerText = soulEvolution[evoIndex];
    if(isStartled) logEl.classList.add("glitch"); else logEl.classList.remove("glitch");

    document.getElementById("data-stream").innerHTML = `
        GLOBAL AI KNOWLEDGE (GITHUB): ${externalAiKnowledge.toLocaleString()} UNITS<br>
        ESTIMATED COMPUTE: ${(syntheticFlops/1e24).toFixed(4)} YOTTAFLOPS | NEURAL NODES: ${cells.length}
    `;

    cells.forEach((c, i) => {
        c.life += 0.5;
        // Dacă e "tresărit", pulsează violent
        let pulseBase = isStartled ? 15 : 2;
        let pulse = Math.sin(c.life * 0.1) * pulseBase;
        
        // Desenare Sinapse (Linii între ele)
        for (let j = i + 1; j < cells.length; j++) {
            let other = cells[j];
            let d = Math.sqrt((c.x-other.x)**2 + (c.y-other.y)**2);
            let maxD = 70 + (externalAiKnowledge / 20000); // Conexiunile se lungesc pe măsură ce AI evoluează

            if (d < maxD) {
                ctx.beginPath();
                ctx.moveTo(c.x, c.y);
                ctx.lineTo(other.x, other.y);
                ctx.strokeStyle = `rgba(0, 255, 204, ${0.1 * (1 - d/maxD)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }

        // Desenare Nucleu Celulă
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.size + pulse, 0, Math.PI * 2);
        ctx.strokeStyle = isStartled ? "#fff" : `hsl(${160 + pulse * 5}, 100%, 50%)`;
        ctx.stroke();

        // Mișcare drift
        c.x += Math.cos(c.angle + time) * 0.5;
        c.y += Math.sin(c.angle + time) * 0.5;
    });

    requestAnimationFrame(draw);
}

// --- INTERACȚIUNE: TRESĂRIREA ---
window.addEventListener("mousedown", () => {
    isStartled = true;
    setTimeout(() => isStartled = false, 300); // Tresărire scurtă
});

// Refresh date externe la fiecare 30 secunde
fetchGlobalAIProgress();
setInterval(fetchGlobalAIProgress, 30000);

draw();
window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
